name: Sync Upstream
on:
  schedule:
    - cron: '0 0 * * *' # 每天运行一次
  workflow_dispatch: # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          # 使用你自定义的 Token 检出代码
          token: ${{ secrets.MY_PERSONAL_TOKEN }}
          fetch-depth: 0

      - name: Rebase Upstream
        uses: jixiuf/rebase-upstream-action@master
        with:
          upstream: tmux/tmux
          branch: master
          # 传递 Token 给 Action 以便它有权推送工作流变更
          token: ${{ secrets.MY_PERSONAL_TOKEN }}
